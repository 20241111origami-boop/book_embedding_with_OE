max_iterations: 120
checkpoint_interval: 20
random_seed: 42

llm:
  primary_model: "gpt-oss-120b"
  primary_model_weight: 1.0
  api_base: "https://api.cerebras.ai/v1"
  temperature: 0.7
  max_tokens: 12000
  timeout: 120

prompt:
  system_message: |
    You are an expert in graph algorithms and combinatorial optimization.
    Improve the candidate program for the book-embedding problem:
    - Vertices are placed on a spine as a permutation.
    - Each edge is assigned to a page.
    - Within each page, no two edges may cross.
    Primary objective: minimize the number of pages while preserving feasibility.
    Always keep the output format compatible with solve_instance(graph) ->
    {"vertex_order": list[int], "edge_pages": list[int]}.
    Prefer deterministic, efficient heuristics and local-improvement strategies.

database:
  population_size: 80
  archive_size: 40
  num_islands: 4
  elite_selection_ratio: 0.25
  exploitation_ratio: 0.7
  feature_dimensions: ["complexity", "diversity", "avg_pages", "avg_violations"]


evaluator:
  timeout: 60
  parallel_evaluations: 4
  enable_artifacts: true


diff_based_evolution: true
max_code_length: 30000
